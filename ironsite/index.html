<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IronSite — Spatial Intelligence Analytics</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
        overflow: hidden;
        height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        background: #111;
        border-bottom: 1px solid #222;
        height: 52px;
        z-index: 100;
        position: relative;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .logo {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #fff;
      }
      .logo span {
        color: #666;
        font-weight: 400;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .timestamp {
        font-size: 11px;
        color: #666;
      }
      .tabs {
        display: flex;
        gap: 2px;
        background: #1a1a1a;
        border-radius: 4px;
        padding: 2px;
      }
      .tab {
        padding: 5px 14px;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #666;
        text-decoration: none;
        border-radius: 3px;
        transition: all 0.2s;
      }
      .tab:hover {
        color: #aaa;
      }
      .tab.active {
        background: #2a2a2a;
        color: #fff;
      }

      .toggle-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        background: transparent;
        border: 1px solid #333;
        border-radius: 4px;
        color: #888;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s;
      }
      .toggle-btn:hover {
        border-color: #555;
        color: #ccc;
      }
      .toggle-btn.active {
        border-color: #3b82f6;
        color: #3b82f6;
        background: rgba(59, 130, 246, 0.08);
      }
      .toggle-key {
        display: inline-block;
        padding: 1px 6px;
        border: 1px solid #444;
        border-radius: 3px;
        font-size: 10px;
        color: #666;
      }

      /* Grid view */
      .main {
        display: flex;
        height: calc(100vh - 52px);
      }
      .grid-container {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 2px;
        padding: 2px;
        background: #0a0a0a;
      }

      .video-cell {
        position: relative;
        background: #111;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s;
      }
      .video-cell:hover {
        outline: 1px solid #333;
      }
      .video-cell video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .video-label {
        position: absolute;
        top: 8px;
        left: 10px;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        z-index: 2;
      }

      .video-badge {
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 3px;
        z-index: 2;
      }
      .badge-production {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .badge-prep {
        background: rgba(234, 179, 8, 0.2);
        color: #eab308;
        border: 1px solid rgba(234, 179, 8, 0.3);
      }
      .badge-downtime {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .badge-transit {
        background: rgba(147, 51, 234, 0.2);
        color: #9333ea;
        border: 1px solid rgba(147, 51, 234, 0.3);
      }

      /* Grid overlay (analytics on) */
      .cell-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;
        z-index: 2;
      }
      .cell-overlay.visible {
        opacity: 1;
      }
      .status-pill {
        position: absolute;
        top: 32px;
        left: 50%;
        transform: translateX(-50%);
        padding: 4px 18px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        backdrop-filter: blur(4px);
      }
      .status-pill.working {
        background: rgba(34, 197, 94, 0.25);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.4);
      }
      .status-pill.preparing {
        background: rgba(234, 179, 8, 0.25);
        color: #eab308;
        border: 1px solid rgba(234, 179, 8, 0.4);
      }
      .status-pill.idle {
        background: rgba(239, 68, 68, 0.25);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.4);
      }
      .status-pill.moving {
        background: rgba(147, 51, 234, 0.25);
        color: #9333ea;
        border: 1px solid rgba(147, 51, 234, 0.4);
      }

      .cycle-counter {
        position: absolute;
        top: 32px;
        right: 12px;
        text-align: right;
      }
      .cycle-count {
        font-size: 28px;
        font-weight: 800;
        color: #fff;
        line-height: 1;
      }
      .cycle-label {
        font-size: 9px;
        color: #888;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .engagement-ring {
        position: absolute;
        top: 32px;
        left: 12px;
        width: 48px;
        height: 48px;
      }
      .engagement-ring svg {
        width: 100%;
        height: 100%;
      }
      .engagement-ring .ring-label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
      }

      .bottom-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 8px 12px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .pace-info {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pace-bar {
        width: 60px;
        height: 4px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      .pace-fill {
        height: 100%;
        border-radius: 2px;
      }
      .pace-text {
        font-size: 10px;
        color: #888;
      }
      .engagement-text {
        font-size: 10px;
        text-align: right;
      }
      .engagement-level {
        font-weight: 700;
        font-size: 11px;
      }
      .engagement-level.high {
        color: #22c55e;
      }
      .engagement-level.med {
        color: #eab308;
      }
      .engagement-level.low {
        color: #ef4444;
      }
      .engagement-sub {
        color: #555;
        font-size: 9px;
      }

      .rec-indicator {
        position: absolute;
        top: 8px;
        left: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        color: #ef4444;
        letter-spacing: 1px;
        z-index: 3;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .rec-indicator.visible {
        opacity: 1;
      }
      .rec-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ef4444;
        animation: pulse 1s ease-in-out infinite;
      }

      /* ========== EXPANDED VIEW ========== */
      .expanded-view {
        position: fixed;
        inset: 0;
        top: 52px;
        background: rgba(10, 10, 10, 0);
        z-index: 50;
        display: none;
        pointer-events: none;
      }
      .expanded-view.open {
        display: flex;
        pointer-events: auto;
        animation: expandFadeIn 0.4s ease forwards;
      }
      .expanded-view.closing {
        animation: expandFadeOut 0.3s ease forwards;
      }

      @keyframes expandFadeIn {
        0% {
          background: rgba(10, 10, 10, 0);
        }
        100% {
          background: rgba(10, 10, 10, 1);
        }
      }
      @keyframes expandFadeOut {
        0% {
          background: rgba(10, 10, 10, 1);
        }
        100% {
          background: rgba(10, 10, 10, 0);
        }
      }

      .expanded-main {
        flex: 1;
        position: relative;
        opacity: 0;
        transform: scale(0.85);
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }
      .expanded-view.open .expanded-main {
        opacity: 1;
        transform: scale(1);
      }
      .expanded-view.closing .expanded-main {
        opacity: 0;
        transform: scale(0.85);
      }

      .expanded-sidebar {
        opacity: 0;
        transform: translateX(30px);
        transition:
          opacity 0.35s ease 0.15s,
          transform 0.35s ease 0.15s;
      }
      .expanded-view.open .expanded-sidebar {
        opacity: 1;
        transform: translateX(0);
      }
      .expanded-view.closing .expanded-sidebar {
        opacity: 0;
        transform: translateX(30px);
        transition-delay: 0s;
      }

      .expanded-main {
        flex: 1;
        position: relative;
      }
      .expanded-main video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      .expanded-back {
        position: absolute;
        top: 16px;
        left: 16px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #333;
        color: #ccc;
        padding: 6px 14px;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        z-index: 5;
        backdrop-filter: blur(4px);
      }
      .expanded-back:hover {
        border-color: #555;
        color: #fff;
      }

      .expanded-name {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #fff;
        z-index: 5;
      }

      /* Cycle notification */
      .cycle-notify {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.4);
        color: #22c55e;
        padding: 8px 24px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .cycle-notify.show {
        opacity: 1;
      }

      /* Expanded sidebar */
      .expanded-sidebar {
        width: 360px;
        background: #111;
        border-left: 1px solid #222;
        overflow-y: auto;
        padding: 20px;
      }
      .expanded-sidebar h2 {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 16px;
      }
      .expanded-sidebar h3 {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #555;
        margin: 20px 0 10px;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid #1a1a1a;
      }
      .stat-label {
        font-size: 11px;
        color: #888;
      }
      .stat-value {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
      }
      .stat-value.green {
        color: #22c55e;
      }
      .stat-value.yellow {
        color: #eab308;
      }
      .stat-value.red {
        color: #ef4444;
      }
      .stat-value.purple {
        color: #9333ea;
      }

      .divider {
        height: 1px;
        background: #222;
        margin: 16px 0;
      }

      .insight-box {
        background: rgba(59, 130, 246, 0.06);
        border: 1px solid rgba(59, 130, 246, 0.15);
        border-radius: 6px;
        padding: 10px 12px;
        margin: 8px 0;
        font-size: 11px;
        line-height: 1.5;
        color: #aaa;
      }
      .insight-box strong {
        color: #3b82f6;
      }

      .motion-log {
        max-height: 200px;
        overflow-y: auto;
      }
      .motion-entry {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        border-bottom: 1px solid #1a1a1a;
        font-size: 11px;
      }
      .motion-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .motion-text {
        color: #aaa;
      }
      .motion-time {
        color: #555;
        margin-left: auto;
        font-size: 10px;
      }

      .pattern-bar {
        display: flex;
        height: 20px;
        border-radius: 3px;
        overflow: hidden;
        margin: 6px 0;
      }
      .pattern-seg {
        transition: width 0.3s;
      }

      /* Sidebar grid view */
      .sidebar {
        width: 0;
        background: #111;
        border-left: 1px solid #222;
        overflow-y: auto;
        overflow-x: hidden;
        transition: width 0.4s;
      }
      .sidebar.open {
        width: 340px;
      }
      .sidebar-content {
        padding: 20px;
        opacity: 0;
        transition: opacity 0.3s ease 0.2s;
        min-width: 300px;
      }
      .sidebar.open .sidebar-content {
        opacity: 1;
      }
      .sidebar h2 {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 16px;
      }
      .sidebar h3 {
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #555;
        margin: 20px 0 10px;
      }
      .bar-chart {
        margin: 8px 0;
      }
      .bar-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }
      .bar-label {
        font-size: 10px;
        color: #888;
        width: 70px;
        text-align: right;
      }
      .bar-track {
        flex: 1;
        height: 6px;
        background: #1a1a1a;
        border-radius: 3px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 3px;
      }
      .bar-val {
        font-size: 10px;
        color: #666;
        width: 40px;
      }
      .worker-card {
        background: #1a1a1a;
        border-radius: 6px;
        padding: 10px 12px;
        margin: 6px 0;
      }
      .worker-name {
        font-size: 11px;
        color: #ccc;
        margin-bottom: 6px;
      }
      .worker-stats {
        display: flex;
        gap: 12px;
      }
      .worker-stat {
        font-size: 10px;
        color: #666;
      }
      .worker-stat span {
        color: #fff;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="status-dot"></div>
        <div class="logo">IRONSITE <span>Spatial Intelligence</span></div>
        <div class="tabs">
          <a class="tab active" href="index.html">Cameras</a>
          <a class="tab" href="research.html">Research</a>
          <a class="tab" href="site.html">Site View</a>
          <a class="tab" href="analytics.html">Analytics</a>
        </div>
      </div>
      <div class="header-right">
        <div class="timestamp" id="clock"></div>
        <button class="toggle-btn" id="toggleBtn" onclick="toggleAnalytics()">
          <span id="toggleText">Enable Analytics</span>
          <span class="toggle-key">A</span>
        </button>
      </div>
    </div>

    <!-- Grid view -->
    <div class="main" id="gridView">
      <div class="grid-container" id="grid"></div>
      <div class="sidebar" id="sidebar">
        <div class="sidebar-content" id="sidebarContent"></div>
      </div>
    </div>

    <!-- Expanded single-camera view -->
    <div class="expanded-view" id="expandedView">
      <div class="expanded-main" id="expandedMain">
        <button class="expanded-back" onclick="closeExpanded()">Back</button>
        <div class="expanded-name" id="expandedName"></div>
        <video id="expandedVideo" muted loop playsinline></video>
        <div class="cycle-notify" id="cycleNotify">Cycle Complete</div>
      </div>
      <div class="expanded-sidebar" id="expandedSidebar"></div>
    </div>

    <script>
      const FEEDS = [
        {
          id: "01_production_masonry",
          label: "CAM 01 — Masonry",
          task: "production",
          raw: "videos/01_production_masonry_raw.mov",
          heatmap: "videos/01_production_masonry_heatmap.mov",
        },
        {
          id: "04_production_masonry",
          label: "CAM 04 — Masonry",
          task: "production",
          raw: "videos/04_production_masonry_raw.mov",
          heatmap: "videos/04_production_masonry_heatmap.mov",
        },
        {
          id: "05_production_mp",
          label: "CAM 05 — Mech/Plumb",
          task: "production",
          raw: "videos/05_production_mp_raw.mov",
          heatmap: "videos/05_production_mp_heatmap.mov",
        },
        {
          id: "09_prep_standby",
          label: "CAM 09 — Prep/Standby",
          task: "prep",
          raw: "videos/09_prep_standby_production_mp_raw.mov",
          heatmap: "videos/09_prep_standby_production_mp_heatmap.mov",
        },
        {
          id: "12_downtime",
          label: "CAM 12 — Transit",
          task: "transit",
          raw: "videos/12_downtime_prep_mp_raw.mov",
          heatmap: "videos/12_downtime_prep_mp_heatmap.mov",
        },
        {
          id: "13_transit",
          label: "CAM 13 — Downtime",
          task: "downtime",
          raw: "videos/13_transit_prep_mp_raw.mov",
          heatmap: "videos/13_transit_prep_mp_heatmap.mov",
        },
      ];

      let ANALYSIS = {};

      let analyticsOn = false;
      let expandedFeed = null;
      let animFrame = null;

      // Simulated gaze state for expanded overlay
      let gazeState = {
        x: 0.5,
        y: 0.5,
        vx: 0,
        vy: 0,
        dwellStart: 0,
        dwellX: 0.5,
        dwellY: 0.5,
        trail: [],
        cyclePhase: 0,
        cycleCount: 0,
        motionLog: [],
      };

      function statusInfo(task) {
        return (
          {
            production: { label: "Working", cls: "working" },
            prep: { label: "Preparing", cls: "preparing" },
            downtime: { label: "Idle", cls: "idle" },
            transit: { label: "Moving", cls: "moving" },
          }[task] || { label: task, cls: "working" }
        );
      }
      function engInfo(center) {
        if (center < 50) return { level: "High", cls: "high" };
        if (center < 65) return { level: "Medium", cls: "med" };
        return { level: "Low", cls: "low" };
      }
      function ringSVG(center) {
        const pct = Math.max(0, Math.min(100, 100 - center));
        const r = 20,
          cx = 24,
          cy = 24,
          circ = 2 * Math.PI * r,
          offset = circ * (1 - pct / 100);
        const eng = engInfo(center);
        const c = { high: "#22c55e", med: "#eab308", low: "#ef4444" }[eng.cls];
        return `<svg viewBox="0 0 48 48"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#222" stroke-width="3"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/></svg>`;
      }

      function analysisTaskFromId(id) {
        return String(id || "").split("_")[1] || "unknown";
      }

      function canonicalAnalysisKey(id) {
        let key = String(id || "").replace(/\.[^.]+$/, "");
        key = key.replace(/_(raw|heatmap)$/, "");
        return (
          {
            "09_prep_standby_production_mp": "09_prep_standby",
            "12_downtime_prep_mp": "12_downtime",
            "13_transit_prep_mp": "13_transit",
          }[key] || key
        );
      }

      function analysisSourcePriority(id) {
        if (/_raw(?:\.[^.]+)?$/.test(String(id || ""))) return 2;
        if (/_heatmap(?:\.[^.]+)?$/.test(String(id || ""))) return 1;
        return 0;
      }

      function averageMetric(items, key) {
        if (!items.length) return 0;
        return items.reduce((sum, item) => sum + (Number(item[key]) || 0), 0) / items.length;
      }

      function centerBiasFromSummary(summary) {
        const regionPreference = summary?.region_preference || {};
        const regionTotal = Object.values(regionPreference).reduce(
          (sum, value) => sum + (Number(value) || 0),
          0,
        );
        return regionTotal > 0
          ? (((regionPreference.CENTER || 0) / regionTotal) * 100)
          : 50;
      }

      // ========== GRID ==========
      function buildGrid() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        FEEDS.forEach((feed) => {
          const data = ANALYSIS[feed.id] || {};
          const st = statusInfo(feed.task);
          const eng = engInfo(data.center || 50);
          const speedPct = Math.min(100, ((data.speed || 0) / 0.5) * 100);
          const speedColor =
            data.speed > 0.4
              ? "#22c55e"
              : data.speed > 0.32
                ? "#eab308"
                : "#ef4444";

          const cell = document.createElement("div");
          cell.className = "video-cell";
          cell.id = `cell-${feed.id}`;
          cell.onclick = () => openExpanded(feed);
          cell.innerHTML = `
            <video class="raw-video" src="public/${feed.raw}" muted loop autoplay playsinline></video>
            <video class="hm-video" src="public/${feed.heatmap}" muted loop playsinline style="display:none"></video>
            <div class="video-label">${feed.label}</div>
            <span class="video-badge badge-${feed.task}">${st.label}</span>
            <div class="cell-overlay">
                <div class="status-pill ${st.cls}">${st.label}</div>
                <div class="engagement-ring">${ringSVG(data.center || 50)}<div class="ring-label">${Math.round(100 - (data.center || 50))}%</div></div>
                <div class="cycle-counter"><div class="cycle-count">${data.cycles || 0}</div><div class="cycle-label">cycles</div></div>
                <div class="bottom-bar">
                    <div class="pace-info"><div class="pace-bar"><div class="pace-fill" style="width:${speedPct}%;background:${speedColor}"></div></div><div class="pace-text">${(data.cycle_dur || 0).toFixed(0)}s / cycle</div></div>
                    <div class="engagement-text"><div class="engagement-level ${eng.cls}">${eng.level} Focus</div><div class="engagement-sub">${(data.center || 0).toFixed(0)}% center bias</div></div>
                </div>
            </div>
            <div class="rec-indicator"><div class="rec-dot"></div>ANALYZING</div>
        `;
          grid.appendChild(cell);
        });
      }

      function toggleAnalytics() {
        analyticsOn = !analyticsOn;
        document
          .getElementById("toggleBtn")
          .classList.toggle("active", analyticsOn);
        document.getElementById("toggleText").textContent = analyticsOn
          ? "Disable Analytics"
          : "Enable Analytics";
        document
          .getElementById("sidebar")
          .classList.toggle("open", analyticsOn);

        FEEDS.forEach((feed) => {
          const cell = document.getElementById(`cell-${feed.id}`);
          if (!cell) return;
          const raw = cell.querySelector(".raw-video"),
            hm = cell.querySelector(".hm-video");
          const overlay = cell.querySelector(".cell-overlay"),
            rec = cell.querySelector(".rec-indicator");
          if (analyticsOn) {
            raw.style.display = "none";
            hm.style.display = "block";
            hm.currentTime = raw.currentTime;
            hm.play();
            raw.pause();
            overlay.classList.add("visible");
            rec.classList.add("visible");
          } else {
            hm.style.display = "none";
            raw.style.display = "block";
            raw.currentTime = hm.currentTime;
            raw.play();
            hm.pause();
            overlay.classList.remove("visible");
            rec.classList.remove("visible");
          }
        });
        if (analyticsOn) renderGridSidebar();
        if (expandedFeed) updateExpandedVideo();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "a" || e.key === "A") toggleAnalytics();
        if (e.key === "Escape" && expandedFeed) closeExpanded();
      });

      // ========== EXPANDED VIEW ==========
      function openExpanded(feed) {
        expandedFeed = feed;
        const data = ANALYSIS[feed.id] || {};
        const view = document.getElementById("expandedView");
        const video = document.getElementById("expandedVideo");

        view.classList.remove("closing");
        video.src = `public/${analyticsOn ? feed.heatmap : feed.raw}`;
        video.play();
        document.getElementById("expandedName").textContent = feed.label;

        view.classList.add("open");

        gazeState = {
          x: 0.5,
          y: 0.5,
          vx: 0,
          vy: 0,
          dwellStart: performance.now(),
          dwellX: 0.5,
          dwellY: 0.5,
          trail: [],
          cyclePhase: 0,
          cycleCount: 0,
          motionLog: [],
        };

        renderExpandedSidebar(feed, data);
        startOverlay(feed, data);
      }

      function closeExpanded() {
        const view = document.getElementById("expandedView");
        view.classList.add("closing");
        view.classList.remove("open");
        if (animFrame) cancelAnimationFrame(animFrame);

        setTimeout(() => {
          view.classList.remove("closing");
          view.style.display = "";
          document.getElementById("expandedVideo").pause();
          expandedFeed = null;
        }, 300);
      }

      function updateExpandedVideo() {
        if (!expandedFeed) return;
        const video = document.getElementById("expandedVideo");
        const currentTime = video.currentTime;
        video.src = `public/${analyticsOn ? expandedFeed.heatmap : expandedFeed.raw}`;
        video.currentTime = currentTime;
        video.play();
      }

      function startOverlay(feed, data) {
        const cycleDur = (data.cycle_dur || 30) * 1000;
        const isProduction = feed.task === "production";
        const cycleNotify = document.getElementById("cycleNotify");

        let lastCycleTime = performance.now();

        function frame() {
          if (!expandedFeed) return;
          animFrame = requestAnimationFrame(frame);
          const now = performance.now();

          // Cycle detection — fires at the real cycle interval for this worker
          if (isProduction && analyticsOn && now - lastCycleTime > cycleDur) {
            lastCycleTime = now;
            gazeState.cycleCount++;
            cycleNotify.classList.add("show");
            setTimeout(() => cycleNotify.classList.remove("show"), 1500);

            gazeState.motionLog.unshift({
              type: "cycle",
              text: `Cycle #${gazeState.cycleCount} completed — ${data.cycle_dur.toFixed(0)}s`,
              time: new Date().toLocaleTimeString("en-US", { hour12: false }),
            });
            updateMotionLog();
          }

          // Periodic motion log entries when analytics is on
          if (analyticsOn && Math.random() < 0.003) {
            const entries = isProduction
              ? [
                  "Fixation on work area",
                  "Scanning material zone",
                  "Checking alignment",
                  "Gaze shift to tool",
                  "Visual inspection",
                ]
              : feed.task === "prep"
                ? ["Surveying workspace", "Scanning materials", "Checking area"]
                : feed.task === "transit"
                  ? [
                      "Forward gaze — walking",
                      "Brief peripheral scan",
                      "Route navigation",
                    ]
                  : ["Idle scan", "Unfocused gaze drift", "Looking around"];

            gazeState.motionLog.unshift({
              type: Math.random() > 0.5 ? "saccade" : "fixation",
              text: entries[Math.floor(Math.random() * entries.length)],
              time: new Date().toLocaleTimeString("en-US", { hour12: false }),
            });
            if (gazeState.motionLog.length > 20) gazeState.motionLog.pop();
            updateMotionLog();
          }
        }

        animFrame = requestAnimationFrame(frame);
      }

      function updateMotionLog() {
        const el = document.getElementById("motionLogList");
        if (!el) return;
        el.innerHTML = gazeState.motionLog
          .map((m) => {
            const color =
              m.type === "cycle"
                ? "#22c55e"
                : m.type === "saccade"
                  ? "#eab308"
                  : "#3b82f6";
            return `<div class="motion-entry"><div class="motion-dot" style="background:${color}"></div><div class="motion-text">${m.text}</div><div class="motion-time">${m.time}</div></div>`;
          })
          .join("");
      }

      function renderExpandedSidebar(feed, data) {
        const st = statusInfo(feed.task);
        const eng = engInfo(data.center || 50);
        const sc =
          {
            working: "green",
            preparing: "yellow",
            idle: "red",
            moving: "purple",
          }[st.cls] || "";
        const isProduction = feed.task === "production";
        const isMasonry = feed.id.includes("masonry");

        const el = document.getElementById("expandedSidebar");
        el.innerHTML = `
        <h2>${feed.label}</h2>

        <h3>Status</h3>
        <div class="stat-row"><div class="stat-label">Activity</div><div class="stat-value ${sc}">${st.label}</div></div>
        <div class="stat-row"><div class="stat-label">Engagement</div><div class="stat-value ${eng.cls}">${eng.level}</div></div>
        <div class="stat-row"><div class="stat-label">Gaze Speed</div><div class="stat-value">${(data.speed || 0).toFixed(3)}</div></div>
        <div class="stat-row"><div class="stat-label">Center Bias</div><div class="stat-value">${(data.center || 0).toFixed(0)}%</div></div>

        <div class="divider"></div>

        <h3>Task Classification</h3>
        <div class="insight-box">
            Activity detected as <strong>${st.label}</strong> based on:
            ${
              data.speed > 0.4
                ? "<br>• Fast gaze movement (>0.40) → active production"
                : data.speed > 0.32
                  ? "<br>• Moderate gaze speed → preparation or light work"
                  : "<br>• Slow gaze movement (<0.32) → idle or transit"
            }
            ${
              data.center > 65
                ? "<br>• High center bias (>65%) → passive forward gaze"
                : data.center > 50
                  ? "<br>• Moderate center bias → partially engaged"
                  : "<br>• Low center bias (<50%) → actively scanning workspace"
            }
        </div>

        <div class="divider"></div>

        <h3>Work Cycle Analysis</h3>
        <div class="stat-row"><div class="stat-label">Total Cycles</div><div class="stat-value">${data.cycles || 0}</div></div>
        <div class="stat-row"><div class="stat-label">Avg Cycle Duration</div><div class="stat-value">${(data.cycle_dur || 0).toFixed(1)}s</div></div>
        <div class="stat-row"><div class="stat-label">Est. Output / Hour</div><div class="stat-value">${data.cycle_dur ? Math.round(3600 / data.cycle_dur) : "—"}</div></div>

        ${
          isProduction
            ? `
        <div class="insight-box">
            ${
              isMasonry
                ? `<strong>Masonry pattern:</strong> Short, fast cycles (${data.cycle_dur?.toFixed(0)}s) — each cycle = one block laid. Eye pattern: block pile → mortar → wall → repeat.`
                : `<strong>Mechanical pattern:</strong> Long cycles (${data.cycle_dur?.toFixed(0)}s) — complex multi-step tasks. Each cycle involves multiple sub-operations.`
            }
        </div>`
            : `
        <div class="insight-box">
            ${
              feed.task === "prep"
                ? "Preparation phase — gathering materials and surveying work area. Cycles represent material staging rounds."
                : feed.task === "transit"
                  ? "Worker in transit between areas. No productive cycles — gaze is forward-facing with minimal scanning."
                  : "Idle/downtime period. Minimal eye movement, high center bias. No productive cycles detected."
            }
        </div>`
        }

        <div class="divider"></div>

        <h3>Repeated Motion Pattern</h3>
        <div class="pattern-bar">
            ${
              isProduction && isMasonry
                ? `
                <div class="pattern-seg" style="width:25%;background:#22c55e" title="Look at blocks"></div>
                <div class="pattern-seg" style="width:15%;background:#3b82f6" title="Check mortar"></div>
                <div class="pattern-seg" style="width:35%;background:#eab308" title="Place & align"></div>
                <div class="pattern-seg" style="width:10%;background:#8b5cf6" title="Verify level"></div>
                <div class="pattern-seg" style="width:15%;background:#666" title="Transition"></div>
            `
                : isProduction
                  ? `
                <div class="pattern-seg" style="width:20%;background:#22c55e" title="Inspect"></div>
                <div class="pattern-seg" style="width:30%;background:#3b82f6" title="Execute"></div>
                <div class="pattern-seg" style="width:20%;background:#eab308" title="Adjust"></div>
                <div class="pattern-seg" style="width:15%;background:#8b5cf6" title="Verify"></div>
                <div class="pattern-seg" style="width:15%;background:#666" title="Transition"></div>
            `
                  : `
                <div class="pattern-seg" style="width:70%;background:#333" title="Unstructured"></div>
                <div class="pattern-seg" style="width:30%;background:#555" title="Brief scanning"></div>
            `
            }
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:6px 0">
            ${
              isProduction && isMasonry
                ? `
                <span style="font-size:9px;color:#22c55e">■ Blocks</span>
                <span style="font-size:9px;color:#3b82f6">■ Mortar</span>
                <span style="font-size:9px;color:#eab308">■ Place</span>
                <span style="font-size:9px;color:#8b5cf6">■ Level</span>
                <span style="font-size:9px;color:#666">■ Move</span>
            `
                : isProduction
                  ? `
                <span style="font-size:9px;color:#22c55e">■ Inspect</span>
                <span style="font-size:9px;color:#3b82f6">■ Execute</span>
                <span style="font-size:9px;color:#eab308">■ Adjust</span>
                <span style="font-size:9px;color:#8b5cf6">■ Verify</span>
                <span style="font-size:9px;color:#666">■ Move</span>
            `
                  : `<span style="font-size:9px;color:#555">No structured pattern detected</span>`
            }
        </div>

        <div class="divider"></div>

        <h3>Live Motion Log</h3>
        <div class="motion-log" id="motionLogList"></div>
    `;
      }

      // ========== GRID SIDEBAR ==========
      function renderGridSidebar() {
        const entries = Object.entries(ANALYSIS).map(([id, value]) => ({
          id,
          ...value,
          task: analysisTaskFromId(id),
        }));
        const byTask = {
          production: entries.filter((entry) => entry.task === "production"),
          prep: entries.filter((entry) => entry.task === "prep"),
          downtime: entries.filter((entry) => entry.task === "downtime"),
          transit: entries.filter((entry) => entry.task === "transit"),
        };
        const taskColors = {
          production: "#22c55e",
          prep: "#eab308",
          downtime: "#ef4444",
          transit: "#9333ea",
        };
        const taskRows = [
          { key: "production", label: "Production" },
          { key: "prep", label: "Prep" },
          { key: "downtime", label: "Downtime" },
          { key: "transit", label: "Transit" },
        ].map(({ key, label }) => ({
          key,
          label,
          avgSpeed: averageMetric(byTask[key], "speed"),
          count: byTask[key].length,
        }));
        const maxSpeed = Math.max(...taskRows.map((row) => row.avgSpeed), 0.0001);

        const masonryWorkers = entries
          .filter((entry) => entry.id.includes("masonry"))
          .sort((a, b) => (b.cycles || 0) - (a.cycles || 0));
        const masonryLeader = masonryWorkers[0] || null;
        const mechWorker = entries.find((entry) => entry.id.includes("production_mp"));

        document.getElementById("sidebarContent").innerHTML = `
        <h2>Attention Diagnostics</h2>
        <h3>Activity Classification</h3>
        <div class="insight-box">Gaze speed classifies activity. <strong>Fast (&gt;0.40)</strong> = production. <strong>Slow (&lt;0.30)</strong> = transit/idle.</div>
        <div class="bar-chart">
            ${taskRows
              .map(
                (row) => `<div class="bar-row"><div class="bar-label">${row.label}</div><div class="bar-track"><div class="bar-fill" style="width:${(row.avgSpeed / maxSpeed) * 100}%;background:${taskColors[row.key]}"></div></div><div class="bar-val">${row.count ? row.avgSpeed.toFixed(3) : "—"}</div></div>`,
              )
              .join("")}
        </div>
        <div class="divider"></div>
        <h3>Cycle Detection</h3>
        <div class="insight-box">Masonry: <strong>${masonryLeader ? masonryLeader.cycles : 0} cycles</strong>${masonryLeader ? ` at ${masonryLeader.cycle_dur.toFixed(1)}s avg pace` : ""}. Mech/Plumb: <strong>${mechWorker ? mechWorker.cycles : 0} cycles</strong>${mechWorker ? ` at ${mechWorker.cycle_dur.toFixed(1)}s avg pace` : ""}.</div>
        <div class="divider"></div>
        <h3>Worker Ranking (Masonry)</h3>
        ${masonryWorkers.length
          ? masonryWorkers
              .map((worker, index) => {
                const workerNumber = worker.id.match(/^(\d+)/)?.[1] || worker.id;
                const suffix = index === 0 ? " — Fastest" : "";
                return `<div class="worker-card"><div class="worker-name">Worker ${workerNumber}${suffix}</div><div class="worker-stats"><div class="worker-stat">Cycles: <span>${worker.cycles || 0}</span></div><div class="worker-stat">Pace: <span>${(worker.cycle_dur || 0).toFixed(1)}s</span></div></div></div>`;
              })
              .join("")
          : `<div class="worker-card"><div class="worker-name">No masonry workers</div><div class="worker-stats"><div class="worker-stat">Cycles: <span>0</span></div><div class="worker-stat">Pace: <span>—</span></div></div></div>`}
        <div style="margin-top:24px;font-size:10px;color:#444;text-align:center">Powered by spatial intelligence model</div>
    `;
      }

      // ========== INIT ==========
      async function loadAnalysis() {
        try {
          const resp = await fetch("data/ironsite_analysis.json", {
            cache: "no-store",
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

          const raw = await resp.json();
          ANALYSIS = {};

          const chosen = {};
          for (const [key, value] of Object.entries(raw)) {
            const summary = value?.summary || {};
            const canonicalKey = canonicalAnalysisKey(key);
            const priority = analysisSourcePriority(key);
            if ((chosen[canonicalKey] ?? -1) > priority) continue;
            chosen[canonicalKey] = priority;

            ANALYSIS[canonicalKey] = {
              cycles: summary.cycles_detected || 0,
              cycle_dur: summary.avg_cycle_duration_s || 0,
              speed: summary.gaze_speed?.avg || 0,
              center: centerBiasFromSummary(summary),
            };
          }
        } catch (error) {
          const protocolHint =
            window.location.protocol === "file:"
              ? " If you opened this page via file://, serve ironsite/ through an HTTP server so fetch() can read data/ironsite_analysis.json."
              : "";
          console.warn(
            `ironsite_analysis.json not found, using empty ANALYSIS.${protocolHint}`,
            error,
          );
        }

        buildGrid();
      }

      loadAnalysis();
      function updateClock() {
        document.getElementById("clock").textContent =
          new Date().toLocaleTimeString("en-US", { hour12: false }) +
          "  " +
          new Date().toLocaleDateString("en-US");
      }
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
